<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerd Arcade Solitaire</title>
    <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-width: 10vw; 
            --card-height: calc(10vw * 1.5); 
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow-x: hidden;
	    overflow-y: auto;
            background: radial-gradient(#0a4d21, #052912);
            font-family: 'Sour Gummy', sans-serif;
            color: white;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 2vh;
	    gap: 8vh
        }

        .top-row, .tableau {
    	    display: grid !important;
    	    grid-template-columns: repeat(7, 1fr) !important;
    	    width: 95vw;
    	    max-width: 1400px;
    	    gap: 1.5vw; /* Consistent spacing */
    	    justify-items: center;
    	    align-items: start;
	}

	.ui-hub {
    	    width: var(--card-width) !important;
	    height: var(--card-height) !important;
	    display: flex;
    	    flex-direction: column;
    	    justify-content: center;
    	    align-items: center;
    	    gap: 15px;
	    background: transparent !important;
	    border: none !important;
	    box-sizing: border-box;
	}

	.score-box {
    	    font-size: 1.5vw;
    	    color: #ffd32a;
    	    text-shadow: 2px 2px 0px #000;
    	    font-weight: bold;
	    margin: 0;
	}

	button {
    	    font-family: 'Sour Gummy', sans-serif;
    	    background: #ff4757;
    	    color: white;
    	    border: none;
    	    padding: 10px 5px;
    	    border-radius: 6px;
    	    cursor: pointer;
    	    font-size: 1vw;
    	    box-shadow: 0 4px 0 #b33939;
    	    width: 90%;
	}

	/* Ensure the foundations don't have any weird margins */
	.foundation {
    	    margin: 0 !important;
	}

        .slot {
            width: var(--card-width);
            height: var(--card-height);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            position: relative;
        }

        /* Card Styling */
        .card {
            width: var(--card-width);
            height: var(--card-height);
            background: white;
            border-radius: 8px;
            border: 1px solid #999;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
            position: absolute;
            cursor: grab;
            color: black;
            font-size: 3vw;
            font-weight: bold;
        }

	/* This replaces your gray background with a Memphis pattern */
	/* We combine .card and .card-back to ensure it overrides the white background */
	.card.card-back {
    	    background-color: #ffffff !important;
    	    background-image: 
        	radial-gradient(#333 10%, transparent 10%),
        	radial-gradient(#333 10%, transparent 10%),
        	linear-gradient(45deg, #ff4757 25%, transparent 25%, transparent 75%, #ff4757 75%, #ff4757),
        	linear-gradient(-45deg, #2ed573 25%, transparent 25%, transparent 75%, #2ed573 75%, #2ed573) !important;
    	    background-size: 20px 20px, 20px 20px, 40px 40px, 40px 40px !important;
    	    background-position: 0 0, 10px 10px, 0 0, 0 0 !important;
    	    border: 3px solid #000 !important; /* Black border makes the Memphis pop */
	}
	.card-back .card-corner {
    	    display: none !important;
	}

        .card.red { color: #d63031; }
        .card.black { color: #2d3436; }

        .card .card-corner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 0.9;
            padding: 4px;
        }

        .top-left { top: 2px; left: 2px; }
        .bottom-right { bottom: 2px; right: 2px; transform: rotate(180deg); }

        /* Stacking Logic for Tableau */
        .tableau .slot .card {
            position: absolute;
            top: 0;
            left: 0;
	    transition: top 0.2s ease;
        }

        .tableau .slot .card:nth-child(2)  { top: 2.5vw; }
	.tableau .slot .card:nth-child(3)  { top: 5.0vw; }
	.tableau .slot .card:nth-child(4)  { top: 7.5vw; }
	.tableau .slot .card:nth-child(5)  { top: 10.0vw; }
	.tableau .slot .card:nth-child(6)  { top: 12.5vw; }
	.tableau .slot .card:nth-child(7)  { top: 15.0vw; }
	.tableau .slot .card:nth-child(8)  { top: 17.5vw; }
	.tableau .slot .card:nth-child(9)  { top: 20.0vw; }
	.tableau .slot .card:nth-child(10) { top: 22.5vw; }
	.tableau .slot .card:nth-child(11) { top: 25.0vw; }
	.tableau .slot .card:nth-child(12) { top: 27.5vw; }
	.tableau .slot .card:nth-child(13) { top: 30.0vw; }

        /* UI Controls */
        .ui-container {
    	    visibility: visible !important; /* Make sure it's not hidden anymore */
    	    display: flex;
    	    flex-direction: column;
    	    justify-content: center;
    	    align-items: center;
    	    gap: 8px;
    	    height: var(--card-height); /* Match the height of the cards */
	}

	.score-box {
    	    font-size: 1.5vw;
    	    font-weight: bold;
    	    color: #ffd32a; /* Bright yellow to pop against the green */
    	    text-shadow: 2px 2px 0px #000;
    	    white-space: nowrap;
	}

        button {
    	    padding: 8px 15px;
    	    font-size: 1vw;
    	    background: #ff4757;
    	    color: white;
    	    border: none;
    	    border-radius: 5px;
    	    cursor: pointer;
    	    font-family: 'Sour Gummy', sans-serif;
    	    box-shadow: 0 3px 0 #b33939;
    	    width: 90%; /* Fit inside the column */
	}

	button:hover {
    	    background: #ff6b81;
	}

	button:active {
    	    transform: translateY(2px);
    	    box-shadow: none;
	}

	.recycle-ui {
    	    cursor: pointer;
    	    font-size: 3vw;
    	    display: flex;
    	    justify-content: center;
    	    align-items: center;
    	    height: 100%;
    	    color: rgba(255, 255, 255, 0.6);
    	    transition: color 0.2s;
	}

	.recycle-ui:hover {
    	    color: white;
	}
    </style>
</head>
<body>
    <div id="game-container">
        <div class="top-row">
            <div class="slot" id="deck" onclick="dealCard()"></div> 
	    <div class="slot" id="waste"></div>                    
	<div class="ui-hub">                                   
	    <div class="score-box">Score: <span id="score">0</span></div>
            <button onclick="restartGame()">Restart</button>
        </div>

        <div class="slot foundation" id="f1"></div>            
	<div class="slot foundation" id="f2"></div>            
	<div class="slot foundation" id="f3"></div>            
	<div class="slot foundation" id="f4"></div>            
    </div>

        <div id="tableau" class="tableau">
            <div class="slot"></div> <div class="slot"></div> <div class="slot"></div> <div class="slot"></div> <div class="slot"></div> <div class="slot"></div> <div class="slot"></div> </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
