<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerd Arcade Solitaire</title>
    <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(#0a4d21, #052912);
            font-family: 'Sour Gummy', sans-serif;
            color: white;
            margin: 0;
	    padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
	    overflow: hidden;
        }

        header { margin-top: 20px; text-align: center; }
        h1 { font-size: 6rem; color: #00d2ff; text-shadow: 0 0 10px #00d2ff; margin: 0; }

        /* GAME LAYOUT */
        #game-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 95vw;
            max-height: 80vh;
            margin-top: 10px;
        }

        .top-row, .tableau {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .slot, .foundation {
	    background-color: rgba(255, 255, 255, 0.05);
	    z-index: 1;
            width: 80px;
    	    height: 120px;
    	    border: 2px dashed rgba(255, 255, 255, 0.2);
    	    border-radius: 8px;
    	    position: relative;
        }

        /* CARD STYLING */
        .card {
            width: 80px;
            height: 120px;
            background: white;
            border-radius: 5px;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            color: black;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            cursor: grab;
            user-select: none;
            border: 1px solid #999;
	    box-sizing: border-box;
        }

	.card:active { cursor: grabbing; 
	}

        .card.red { color: #e94560; }
        .card.back { 
            background: #00d2ff; 
            background-image: repeating-linear-gradient(45deg, #00d2ff, #00d2ff 10px, #0099bb 10px, #0099bb 20px);
        }

        .controls {
    	    position: absolute;
	    top: 20px;
    	    right: 20px;
    	    z-index: 2000; /* Ensures it stays above floating cards */
	}

	.controls button {
    	    padding: 10px 20px;
    	    font-family: 'Sour Gummy', sans-serif;
    	    background-color: #ff4757; /* A nice "arcade red" */
    	    color: white;
    	    border: none;
    	    border-radius: 5px;
    	    cursor: pointer;
    	    box-shadow: 0 4px 0 #b33939; /* 3D effect */
    	    transition: all 0.2s;
	}

	.controls button:hover {
    	    background-color: #ff6b81;
     	    transform: translateY(-2px);
	}

	.controls button:active {
    	    transform: translateY(2px);
    	    box-shadow: none;
	}

	.refresh-icon {
    	    font-size: 2rem;
    	    display: flex;
    	    justify-content: center;
    	    align-items: center;
    	    height: 100%;
    	    cursor: pointer;
    	    color: rgba(255, 255, 255, 0.5);
	}
    </style>
</head>
<body>

    <header>
        <h1>Solitaire</h1>
        
    </header>

    <div id="game-container">
        <div class="top-row">
    	    <div class="slot" id="deck" onclick="dealCard()"></div>
    	    <div class="slot" id="waste"></div>
    
    	    <div class="spacer" style="width: 80px;"></div> 

    	    <div class="slot foundation" id="f1"></div>
    	    <div class="slot foundation" id="f2"></div>
    	    <div class="slot foundation" id="f3"></div>
    	    <div class="slot foundation" id="f4"></div>
	</div>
        <div class="tableau" id="tableau">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
    </div>

    <div class="controls">
        <span style="margin-right: 15px; font-weight: bold; font-size: 1.2rem;">Score: <span id="score">0</span></span>
	<button onclick="initGame()">Restart Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
