<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerd Arcade Solitaire</title>
    <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(#0a4d21, #052912);
            font-family: 'Sour Gummy', sans-serif;
            color: white;
            margin: 0;
	    padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
	    overflow: hidden;
        }

        header { margin-top: 20px; text-align: center; }
        h1 { font-size: 3rem; color: #00d2ff; text-shadow: 0 0 10px #00d2ff; margin: 0; }

        /* GAME LAYOUT */
        #game-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 95vw;
            max-height: 80vh;
            margin-top: 10px;
        }

        .top-row, .tableau {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .slot {
            width: 80px;
    	    height: 120px;
    	    border: 2px dashed rgba(255, 255, 255, 0.2);
    	    border-radius: 8px;
    	    position: relative;
        }

        /* CARD STYLING */
        .card {
            width: 80px;
            height: 120px;
            background: white;
            border-radius: 5px;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            color: black;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            cursor: grab;
            user-select: none;
            border: 1px solid #999;
	    box-sizing: border-box;
        }

	.card:active { cursor: grabbing; 
	}

        .card.red { color: #e94560; }
        .card.back { 
            background: #00d2ff; 
            background-image: repeating-linear-gradient(45deg, #00d2ff, #00d2ff 10px, #0099bb 10px, #0099bb 20px);
        }

        .controls { margin-top: 30px; }
        button {
            padding: 12px 40px;
            font-family: 'Sour Gummy', sans-serif;
            font-size: 1.2rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Solitaire</h1>
        <p>Score: <span id="score">0</span></p>
    </header>

    <div id="game-container">
        <div class="top-row">
            <div class="slot" id="deck" onclick="dealCard()"></div>
            <div class="slot" id="waste"></div>
            <div></div> <div class="slot foundation"></div>
            <div class="slot foundation"></div>
            <div class="slot foundation"></div>
            <div class="slot foundation"></div>
        </div>
        <div class="tableau" id="tableau">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="initGame()">Restart Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
